version: '3.9'

services:
  shard1:
    image: postgres:16
    container_name: shard1
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: kvstore
    ports:
      - "5433:5432"

  shard2:
    image: postgres:16
    container_name: shard2
